<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(to right,#4facfe,#8e44ad);
        }

        .container{
            width:700px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 0px 15px gray;
        }

        h1{
            color:#4b0082;
        }

        p{
            color:gray;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            width:180px;
            padding:15px;
            margin:15px;
            text-decoration:none;
            color:white;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
        }

        .add{
            background:#28a745;
        }

        .view{
            background:#007bff;
        }

        .logout{
            background:#dc3545;
        }

        .btn:hover{
            opacity:0.8;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Student Management System</h1>

    <p>Welcome to Dashboard</p>

    <a href="/add" class="btn add">➕ Add Student</a>

    <a href="/view" class="btn view">📋 View Students</a>

    <br><br>

    <a href="/login" class="btn logout">🚪 Logout</a>

</div>

</body>

</html>
