<!DOCTYPE html>
<html>

<head>
    <title>Add Student</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(to right,#4facfe,#8e44ad);
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px gray;
        }

        h2{
            text-align:center;
            color:#4b0082;
        }

        label{
            font-weight:bold;
        }

        input[type=text]{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid gray;
            border-radius:8px;
        }

        input[type=submit]{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        input[type=submit]:hover{
            background:#1f7a33;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Add Student</h2>

<form method="POST">

<label>Student Name</label>

<input type="text" name="name" placeholder="Enter Student Name" required>

<label>Roll Number</label>

<input type="text" name="rollno" placeholder="Enter Roll Number" required>

<input type="submit" value="Save Student">

</form>

<a href="/dashboard" class="back">⬅ Back to Dashboard</a>

</div>

</body>

</html>
