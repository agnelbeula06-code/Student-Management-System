<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(to right,#4facfe,#8e44ad);
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px gray;
        }

        h2{
            text-align:center;
            color:#4b0082;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:8px;
            border:1px solid gray;
        }

        input[type=submit]{
            background:#28a745;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        input[type=submit]:hover{
            background:#1f7a33;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
            color:blue;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Student Login</h2>

<form method="POST">

<label>Username</label>

<input type="text" name="username" required>

<label>Password</label>

<input type="password" name="password" required>

<input type="submit" value="Login">

</form>

<p>
New User?
<a href="/">Register Here</a>
</p>

</div>

</body>

</html>
